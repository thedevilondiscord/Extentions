<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 10px;
      background-color: #0F0F11;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #F5F5F5;
      overflow: hidden;
    }

    .frame-container {
      position: relative;
      border: 1px solid #161619;
      border-radius: 8px;
      background-color: #0F0F11;
      padding: 8px;
    }

    /* Cover Branding Element */
    .banner-image {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 8px;
      border: 1px solid #161619;
    }

    .header-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      border-bottom: 1px solid #161619;
      padding-bottom: 6px;
    }

    .title {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #F5F5F5;
      text-transform: uppercase;
    }

    .utility-cluster {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .util-btn {
      width: 22px;
      height: 22px;
      background-color: #161619;
      border: 1px solid #161619;
      border-radius: 4px;
      color: #B4B4B4;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toast-alert {
      position: absolute;
      top: -24px;
      left: 0;
      width: 100%;
      height: 20px;
      background-color: #161619;
      border-bottom: 1px solid #64FF64;
      color: #64FF64;
      font-size: 9px;
      font-weight: bold;
      text-align: center;
      line-height: 20px;
      display: none;
      z-index: 100;
      text-transform: uppercase;
    }

    label {
      display: block;
      font-size: 9px;
      font-weight: bold;
      color: #B4B4B4;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea, input {
      width: 100%;
      box-sizing: border-box;
      background-color: #161619;
      border: 1px solid #161619;
      border-radius: 4px;
      color: #F5F5F5;
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      padding: 6px;
      margin-bottom: 8px;
      outline: none;
      resize: none;
    }

    textarea:focus, input:focus {
      border-color: #B4B4B4;
    }

    .btn-matrix {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #161619;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.15s ease;
    }

    .btn-off { background-color: #161619; color: #F5F5F5; }
    .btn-off:hover { background-color: #222225; }
    .btn-on { background-color: #F5F5F5; color: #0F0F11; }

    .ticker-footer {
      border-top: 1px solid #161619;
      padding-top: 5px;
      font-family: monospace;
      font-size: 9px;
      color: #B4B4B4;
      text-align: center;
      min-height: 12px;
    }
  </style>
</head>
<body>

  <div class="frame-container">
    <div class="toast-alert" id="toastNotice">Saved successfully</div>

    <!-- The Requested Cover Image Display Banner -->
    <img src="icon.png" class="banner-image" alt="Branding Banner">

    <!-- Header Block -->
    <div class="header-panel">
      <div class="title">👑 KABIR INSTA RULER</div>
      <div class="utility-cluster">
        <input type="file" id="fileInput" accept=".txt" style="display: none;">
        <button class="util-btn" id="fileBtn" title="Upload text file">📁</button>
        <button class="util-btn" id="creditsBtn" title="Credits">🔗</button>
      </div>
    </div>

    <label>📬 Messages (Write or upload text file)</label>
    <textarea id="messageQueue" rows="4" placeholder="1> First message&#10;2> Second message"></textarea>

    <label>⏳ Message Delay (Seconds)</label>
    <input type="number" id="customDelay" value="600" min="1">

    <div class="btn-matrix">
      <button id="startBtn" class="action-btn btn-off">▶️ Start</button>
      <button id="stopBtn" class="action-btn btn-off" style="color:#FF6464;">🛑 Stop</button>
    </div>

    <div class="ticker-footer" id="liveTicker">Ready to start</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
